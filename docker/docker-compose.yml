# CreditWise Docker Compose 配置
#
# 使用方式：
#   私有化单用户：  ENABLE_AUTH=false docker-compose up -d
#   内网多用户：    docker-compose up -d（默认。见下方"首次使用"说明）
#
# 首次使用内网多用户模式（零配置，推荐）：
#   直接 docker compose up -d 即可。容器首次启动时若检测到数据库中没有任何账户
#   （且 config/users.yaml 也不存在/未配置），会自动生成一个随机密码的初始
#   admin 账户，并打印到启动日志——运行 `docker compose logs` 查看一次性密码，
#   首次登录后会被强制要求修改密码。详见 API/main.py::_ensure_bootstrap_admin_if_empty
#   与 docs/user_management_module_design.md §十七。
#
# 首次使用内网多用户模式（传统手动方式，适合需要自定义初始账户名/多个账户的场景）：
#   1. cp config/users.yaml.example config/users.yaml
#   2. python scripts/hash_password.py <密码>
#   3. 编辑 config/users.yaml 填入哈希值
#   4. docker-compose up -d

services:
  creditwise:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - OFFLINE_MODE=${OFFLINE_MODE:-false}
    image: creditwise:latest
    container_name: creditwise-api

    # 从项目根目录的 .env 文件读取环境变量
    env_file:
      - ../.env

    ports:
      - "8200:8200"   # API 服务 + 前端
      - "8100:8100"   # 文件下载服务

    volumes:
      # 持久化数据（容器重启不丢失）
      - ../workspace:/app/workspace
      - ../execution_states:/app/execution_states
      - ../task_results:/app/task_results
      - ../logs:/app/logs
      # 数据库文件
      - ../llm_manager.db:/app/llm_manager.db
      - ../task_manager.db:/app/task_manager.db
      # 用户配置目录（挂载整个目录而非单个 users.yaml 文件——若挂载一个宿主机
      # 不存在的单文件路径，Docker 会在容器内自动创建同名空目录兜底，导致
      # config/users.yaml 被误判为"已存在"（实为空目录），引发 IsADirectoryError。
      # 挂载整个目录可从根上避免这个问题，同时让 login_state.json 等运行时状态
      # 文件也能顺带持久化，无需为每个新文件单独加一行 volumes 配置）
      - ../config:/app/config
      # .env 文件（供 Python dotenv 读取）
      - ../.env:/app/.env

    environment:
      # LLM Manager 加密密钥 和 LLM API 密钥：
      # 已通过 env_file (../.env) 加载，不在此重复定义
      # 否则 environment 块的 ${VAR:-} 会在 shell 无此变量时覆盖 env_file 为空值
      # 服务配置
      - API_HOST=0.0.0.0
      - API_PORT=8200
      - DEV_MODE=false
      # 认证控制：默认开启（内网多用户），私有化单用户场景显式设 ENABLE_AUTH=false 关闭
      - ENABLE_AUTH=${ENABLE_AUTH:-true}
      # CORS（生产模式同源，一般不需要配置）
      - CORS_ORIGINS=${CORS_ORIGINS:-}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
