<!-- 模型参数配置模态框 -->
<div id="model-config-modal" class="modal">
  <div class="modal-content large">
    <div class="modal-header">
      <h3>模型参数配置</h3>
      <span class="model-context">通道：<span id="channel-name"></span> | 模型：<span id="model-name"></span></span>
      <button class="modal-close" onclick="closeModelConfigModal()">×</button>
    </div>
    
    <div class="modal-body">
      <!-- 预设模板选择 -->
      <div class="config-section">
        <h4>场景预设</h4>
        <div class="preset-description">
          选择与您的使用场景最匹配的预设，将自动应用优化的参数和系统提示词
        </div>
        <div class="preset-buttons">
          <button onclick="applyPreset('general_chat')" class="preset-btn" title="日常问答、数据咨询、概念解释等通用交互">
            💬 通用对话
          </button>
          <button onclick="applyPreset('param_extraction')" class="preset-btn" title="从自然语言中提取SOP任务参数">
            🎯 参数推断
          </button>
          <button onclick="applyPreset('result_explanation')" class="preset-btn" title="将分析结果转化为业务语言">
            📊 结果解释
          </button>
        </div>
        <div id="preset-info"></div>
      </div>
      
      <!-- 基础参数 -->
      <div class="config-section">
        <h4>基础参数</h4>
        <div class="param-grid">
          <div class="param-item">
            <label for="temperature">Temperature</label>
            <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" 
                   oninput="updateParameterDisplay('temperature')">
            <span class="param-value" id="temperature-value">0.7</span>
            <small class="param-desc">控制输出的随机性，值越低越确定</small>
          </div>
          
          <div class="param-item">
            <label for="top_p">Top P</label>
            <input type="range" id="top_p" min="0" max="1" step="0.05" value="1.0"
                   oninput="updateParameterDisplay('top_p')">
            <span class="param-value" id="top_p-value">1.0</span>
            <small class="param-desc">限制词汇选择范围</small>
          </div>
          
          <div class="param-item">
            <label for="max_tokens">Max Tokens</label>
            <input type="number" id="max_tokens" min="1" max="32768" value="2000"
                   oninput="updateParameterDisplay('max_tokens')">
            <small class="param-desc">最大生成token数</small>
          </div>
        </div>
      </div>
      
      <!-- 高级参数 -->
      <div class="config-section collapsible">
        <h4 onclick="toggleSection('advanced')">高级参数 ▼</h4>
        <div id="advanced-params" class="param-grid">
          <div class="param-item">
            <label for="frequency_penalty">Frequency Penalty</label>
            <input type="range" id="frequency_penalty" min="-2" max="2" step="0.1" value="0"
                   oninput="updateParameterDisplay('frequency_penalty')">
            <span class="param-value" id="frequency_penalty-value">0</span>
            <small class="param-desc">减少重复内容的生成</small>
          </div>
          
          <div class="param-item">
            <label for="presence_penalty">Presence Penalty</label>
            <input type="range" id="presence_penalty" min="-2" max="2" step="0.1" value="0"
                   oninput="updateParameterDisplay('presence_penalty')">
            <span class="param-value" id="presence_penalty-value">0</span>
            <small class="param-desc">鼓励谈论新话题</small>
          </div>
        </div>
      </div>
      
      <!-- 系统提示词 -->
      <div class="config-section">
        <h4>系统提示词</h4>
        <div class="system-prompt-container">
          <div class="prompt-actions">
            <button type="button" class="btn btn-small" onclick="resetSystemPrompt()">恢复默认</button>
            <button type="button" class="btn btn-small" onclick="expandSystemPrompt()">展开</button>
            <button type="button" class="btn btn-small" onclick="shrinkSystemPrompt()">收起</button>
          </div>
          <textarea id="system_prompt" rows="8" placeholder="设置模型的系统提示词..." 
                    oninput="updateCharCount()"></textarea>
          <div class="char-count">
            <span id="char-count">0</span> 字符
          </div>
        </div>
      </div>
    </div>
    
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" onclick="resetToDefaults()">恢复默认</button>
      <button type="button" class="btn btn-secondary" onclick="closeModelConfigModal()">取消</button>
      <button type="button" class="btn btn-primary" onclick="saveModelConfig()">
        保存配置 <span id="save-spinner" class="spinner" style="display: none;"></span>
      </button>
    </div>
  </div>
</div>
