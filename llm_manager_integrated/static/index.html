<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; connect-src 'self' http://localhost:8200 ws:; font-src 'self' data:;">
    <title>LLM Manager - API管理界面</title>
    <!-- 解决__DEFINES__未定义错误 -->
    <script>
        window.__DEFINES__ = {};
        window.DEFINE = {};
    </script>
    <link rel="stylesheet" href="/llm-manager/static/tailwind.css">
    <style>
        /* 自定义样式 */
        .btn {
            @apply px-4 py-2 rounded-md font-medium text-sm cursor-pointer transition-all duration-300 inline-flex items-center gap-2 focus:outline-none focus:ring-2 focus:ring-offset-2;
        }
        
        .btn-primary {
            @apply bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500;
        }
        
        .btn-secondary {
            @apply bg-gray-200 text-gray-800 hover:bg-gray-300 focus:ring-gray-500;
        }
        
        .btn-danger {
            @apply bg-red-600 text-white hover:bg-red-700 focus:ring-red-500;
        }
        
        .btn-success {
            @apply bg-green-600 text-white hover:bg-green-700 focus:ring-green-500;
        }
        
        .btn:disabled {
            @apply opacity-60 cursor-not-allowed;
        }
        
        .card {
            @apply bg-white rounded-lg shadow-md p-6 mb-5;
        }
        
        .nav-tabs {
            @apply flex border-b border-gray-200 mb-6;
        }
        
        .nav-item {
            @apply px-4 py-2 cursor-pointer border-b-2 border-transparent hover:border-gray-300 transition-colors;
        }
        
        .nav-item.active {
            @apply border-blue-500 text-blue-600;
        }
        
        .tab-content {
            @apply hidden;
        }
        
        .tab-content.active {
            @apply block;
        }
        
        .modal {
            @apply fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden;
        }
        
        .modal.active {
            @apply flex;
        }
        
        .modal-content {
            @apply bg-white rounded-lg shadow-xl max-w-md w-full mx-4;
        }
        
        .modal-header {
            @apply flex items-center justify-between p-6 border-b border-gray-200;
        }
        
        .modal-body {
            @apply p-6;
        }
        
        .modal-close {
            @apply text-gray-500 hover:text-gray-700 text-2xl leading-none;
        }
        
        .form-group {
            @apply mb-4;
        }
        
        .form-group label {
            @apply block text-sm font-medium text-gray-700 mb-1;
        }
        
        .form-group input, .form-group select {
            @apply w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500;
        }
        
        .form-actions {
            @apply flex justify-end gap-2 mt-6;
        }
        
        .tab-header {
            @apply flex items-center justify-between mb-4;
        }
        
        .tab-actions {
            @apply flex gap-2;
        }
        
        .table {
            @apply w-full border-collapse border border-gray-200;
        }
        
        .table th, .table td {
            @apply border border-gray-200 px-4 py-2 text-left;
        }
        
        .table th {
            @apply bg-gray-50 font-medium text-gray-700;
        }
        
        .loading {
            @apply text-center py-8 text-gray-500;
        }
        
        .empty-state {
            @apply text-center py-8 text-gray-500;
        }
        
        .alert {
            @apply p-3 rounded-md mb-4;
        }
        
        .alert.success {
            @apply bg-green-100 text-green-700 border border-green-200;
        }
        
        .alert.error {
            @apply bg-red-100 text-red-700 border border-red-200;
        }
        
        .spinner {
            @apply inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin;
        }
        
        .status-badge {
            @apply px-2 py-1 text-xs rounded-full;
        }
        
        .status-badge.success {
            @apply bg-green-100 text-green-800;
        }
        
        .status-badge.error {
            @apply bg-red-100 text-red-800;
        }
        
        /* 配置列表能力图标样式 */
        .capability-icon-list {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            padding: 1px 4px;
            margin-left: 3px;
            border-radius: 3px;
            cursor: help;
        }
        
        .capability-icon-list.web-search {
            background-color: #dbeafe;
            color: #2563eb;
        }
        
        .capability-icon-list.deep-thinking {
            background-color: #f3e8ff;
            color: #9333ea;
        }
        
        .model-config-display {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
            white-space: nowrap;
        }
        
        .model-config-display .model-name {
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 max-w-7xl">
        <header class="py-6">
            <div class="flex items-center justify-between">
                <h1 class="text-3xl font-bold text-gray-900">LLM Manager</h1>
                <div class="header-actions">
                </div>
            </div>
        </header>

        <nav class="nav-tabs">
            <div class="nav-item active" onclick="switchTab(event, 'channels')">
                <span class="nav-icon">📡</span>
                <span class="nav-label">配置管理</span>
            </div>
            <div class="nav-item" onclick="switchTab(event, 'logs')">
                <span class="nav-icon">📝</span>
                <span class="nav-label">API日志</span>
            </div>
            <div class="nav-item" onclick="switchTab(event, 'stats')">
                <span class="nav-icon">📊</span>
                <span class="nav-label">统计信息</span>
            </div>
            <div class="nav-item" onclick="switchTab(event, 'settings')">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">系统设置</span>
            </div>
        </nav>

        <main class="content">
            <!-- 渠道管理标签页 -->
            <section id="channels-tab" class="tab-content active">
                <div class="tab-header">
                    <h2 class="text-xl font-semibold text-gray-900">LLM配置管理</h2>
                    <div class="tab-actions">
                        <button class="btn btn-success" onclick="refreshChannels()">刷新</button>
                        <button class="btn btn-primary" onclick="openCreateChannelModal()">新建配置</button>
                    </div>
                </div>
                <div id="channels-list" class="list-container">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <!-- API日志标签页 -->
            <section id="logs-tab" class="tab-content">
                <div class="tab-header">
                    <h2 class="text-xl font-semibold text-gray-900">API调用日志</h2>
                    <div class="tab-actions">
                        <button class="btn btn-success" onclick="refreshLogs()">刷新</button>
                    </div>
                </div>
                <div id="logs-list" class="list-container">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <!-- 统计信息标签页 -->
            <section id="stats-tab" class="tab-content">
                <div class="tab-header">
                    <h2 class="text-xl font-semibold text-gray-900">系统统计</h2>
                    <div class="tab-actions">
                        <button class="btn btn-success" onclick="refreshStats()">刷新</button>
                    </div>
                </div>
                <div id="stats-content" class="stats-container">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <!-- 系统设置标签页 -->
            <section id="settings-tab" class="tab-content">
                <div class="tab-header">
                    <h2 class="text-xl font-semibold text-gray-900">系统信息</h2>
                    <div class="tab-actions">
                        <button class="btn btn-success" onclick="refreshSystemInfo()">刷新</button>
                    </div>
                </div>
                <div id="system-info" class="info-container">
                    <div class="loading">加载中...</div>
                </div>
            </section>
        </main>

        <!-- 创建配置模态框 -->
        <div id="create-channel-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>新建配置</h3>
                    <button class="modal-close" onclick="closeCreateChannelModal()">×</button>
                </div>
                <div class="modal-body">
                    <div id="modal-alert"></div>
                    <form id="channel-form" onsubmit="submitChannelForm(event)">
                        <div class="form-group">
                            <label for="name">配置名称</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                    <div class="form-group">
                        <label for="type">配置类型</label>
                        <select id="type" name="type" required onchange="updateBaseUrl()">
                            <option value="">请选择类型</option>
                            <option value="openai">OpenAI</option>
                            <option value="google">GoogleAI</option>
                            <option value="deepseek">DeepSeek</option>
                            <option value="claude">Claude</option>
                            <option value="qwen">通义千问</option>
                            <option value="custom">自定义</option>
                        </select>
                    </div>
                        <div class="form-group">
                            <label for="models">模型名称</label>
                            <input type="text" id="models" name="models" required placeholder="如: gpt-3.5-turbo">
                        </div>
                        <div class="form-group">
                            <label for="base_url">API Url</label>
                            <input type="url" id="base_url" name="base_url" required placeholder="https://api.openai.com/v1">
                        </div>
                        <div class="form-group">
                            <label for="api_key">API密钥</label>
                            <input type="password" id="api_key" name="api_key" required>
                        </div>
                        <div class="form-group">
                            <div class="flex items-center justify-between">
                                <div>
                                    <label class="text-sm font-medium text-gray-700">启用流式输出</label>
                                    <p class="text-gray-500 text-xs mt-0.5">关闭后响应将在完成后一次性返回，适用于流式不稳定的场景</p>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="stream_output" name="stream_output" checked class="sr-only peer">
                                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>模型测试</label>
                            <button type="button" class="btn btn-secondary" onclick="testModelResponse('create')">
                                测试模型响应 <span id="test-create-spinner" class="spinner" style="display: none;"></span>
                            </button>
                            <div id="test-create-result" class="mt-2 text-sm"></div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="closeCreateChannelModal()">取消</button>
                            <button type="submit" class="btn btn-primary">
                                创建配置 <span id="submit-spinner"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- 编辑配置模态框 -->
        <div id="edit-channel-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>编辑配置</h3>
                    <button class="modal-close" onclick="closeEditChannelModal()">×</button>
                </div>
                <div class="modal-body">
                    <div id="edit-modal-alert"></div>
                    <form id="edit-channel-form" onsubmit="submitEditChannelForm(event)">
                        <div class="form-group">
                            <label for="edit-name">配置名称</label>
                            <input type="text" id="edit-name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="edit-type">配置类型</label>
                            <select id="edit-type" name="type" required onchange="updateEditBaseUrl()">
                                <option value="">请选择类型</option>
                                <option value="openai">OpenAI</option>
                                <option value="google">GoogleAI</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="claude">Claude</option>
                                <option value="qwen">通义千问</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-models">模型名称</label>
                            <input type="text" id="edit-models" name="models" required placeholder="如: gpt-3.5-turbo">
                        </div>
                        <div class="form-group">
                            <label for="edit-base_url">API Url</label>
                            <input type="url" id="edit-base_url" name="base_url" required placeholder="https://api.openai.com/v1">
                        </div>
                        <div class="form-group">
                            <label for="edit-api_key">API密钥</label>
                            <input type="password" id="edit-api_key" name="api_key" placeholder="留空保持不变">
                        </div>
                        <div class="form-group">
                            <div class="flex items-center justify-between">
                                <div>
                                    <label class="text-sm font-medium text-gray-700">启用流式输出</label>
                                    <p class="text-gray-500 text-xs mt-0.5">关闭后响应将在完成后一次性返回，适用于流式不稳定的场景</p>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="edit-stream_output" name="stream_output" checked class="sr-only peer">
                                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>模型测试</label>
                            <button type="button" class="btn btn-secondary" onclick="testModelResponse('edit')">
                                测试模型响应 <span id="test-edit-spinner" class="spinner" style="display: none;"></span>
                            </button>
                            <div id="test-edit-result" class="mt-2 text-sm"></div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="closeEditChannelModal()">取消</button>
                            <button type="submit" class="btn btn-primary">
                                更新配置 <span id="edit-submit-spinner"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 模型配置样式 -->
    <link rel="stylesheet" href="/static/shared/css/model-config.css">
    
    <!-- 主脚本 -->
    <script src="/static/scripts/main.js"></script>
    
    <!-- 模型配置相关脚本 -->
    <script src="/static/shared/js/model_task_presets.js"></script>
    <script src="/static/shared/js/model-config.js"></script>
</body>
</html>
