<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com; connect-src 'self' http://localhost:8200 ws:;">
    <title>LLM Manager - API管理界面</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
    <style>
        /* 自定义样式 */
        .btn {
    display: inline-flex;
    cursor: pointer;
    align-items: center;
    gap: 0.5rem;
    border-radius: 0.375rem;
    padding-left: 1rem;
    padding-right: 1rem;
    padding-top: 0.5rem;
    padding-bottom: 0.5rem;
    font-size: 0.875rem;
    line-height: 1.25rem;
    font-weight: 500;
    transition-property: all;
    transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    transition-duration: 300ms
}
        .btn:focus {
    outline: 2px solid transparent;
    outline-offset: 2px;
    --tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color);
    --tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(2px + var(--tw-ring-offset-width)) var(--tw-ring-color);
    box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow, 0 0 #0000);
    --tw-ring-offset-width: 2px
}
        
        .btn-primary {
    --tw-bg-opacity: 1;
    background-color: rgb(37 99 235 / var(--tw-bg-opacity));
    --tw-text-opacity: 1;
    color: rgb(255 255 255 / var(--tw-text-opacity))
}
        
        .btn-primary:hover {
    --tw-bg-opacity: 1;
    background-color: rgb(29 78 216 / var(--tw-bg-opacity))
}
        
        .btn-primary:focus {
    --tw-ring-opacity: 1;
    --tw-ring-color: rgb(59 130 246 / var(--tw-ring-opacity))
}
        
        .btn-secondary {
    --tw-bg-opacity: 1;
    background-color: rgb(229 231 235 / var(--tw-bg-opacity));
    --tw-text-opacity: 1;
    color: rgb(31 41 55 / var(--tw-text-opacity))
}
        
        .btn-secondary:hover {
    --tw-bg-opacity: 1;
    background-color: rgb(209 213 219 / var(--tw-bg-opacity))
}
        
        .btn-secondary:focus {
    --tw-ring-opacity: 1;
    --tw-ring-color: rgb(107 114 128 / var(--tw-ring-opacity))
}
        
        .btn-danger {
    --tw-bg-opacity: 1;
    background-color: rgb(220 38 38 / var(--tw-bg-opacity));
    --tw-text-opacity: 1;
    color: rgb(255 255 255 / var(--tw-text-opacity))
}
        
        .btn-danger:hover {
    --tw-bg-opacity: 1;
    background-color: rgb(185 28 28 / var(--tw-bg-opacity))
}
        
        .btn-danger:focus {
    --tw-ring-opacity: 1;
    --tw-ring-color: rgb(239 68 68 / var(--tw-ring-opacity))
}
        
        .btn-success {
    --tw-bg-opacity: 1;
    background-color: rgb(22 163 74 / var(--tw-bg-opacity));
    --tw-text-opacity: 1;
    color: rgb(255 255 255 / var(--tw-text-opacity))
}
        
        .btn-success:hover {
    --tw-bg-opacity: 1;
    background-color: rgb(21 128 61 / var(--tw-bg-opacity))
}
        
        .btn-success:focus {
    --tw-ring-opacity: 1;
    --tw-ring-color: rgb(34 197 94 / var(--tw-ring-opacity))
}
        
        .btn:disabled {
    cursor: not-allowed;
    opacity: 0.6
}
        
        .card {
    margin-bottom: 1.25rem;
    border-radius: 0.5rem;
    --tw-bg-opacity: 1;
    background-color: rgb(255 255 255 / var(--tw-bg-opacity));
    padding: 1.5rem;
    --tw-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    --tw-shadow-colored: 0 4px 6px -1px var(--tw-shadow-color), 0 2px 4px -2px var(--tw-shadow-color);
    box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow)
}
        
        .nav-tabs {
    margin-bottom: 1.5rem;
    display: flex;
    border-bottom-width: 1px;
    --tw-border-opacity: 1;
    border-color: rgb(229 231 235 / var(--tw-border-opacity))
}
        
        .nav-item {
    cursor: pointer;
    border-bottom-width: 2px;
    border-color: transparent;
    padding-left: 1rem;
    padding-right: 1rem;
    padding-top: 0.5rem;
    padding-bottom: 0.5rem;
    transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
    transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    transition-duration: 150ms
}
        
        .nav-item:hover {
    --tw-border-opacity: 1;
    border-color: rgb(209 213 219 / var(--tw-border-opacity))
}
        
        .nav-item.active {
    --tw-border-opacity: 1;
    border-color: rgb(59 130 246 / var(--tw-border-opacity));
    --tw-text-opacity: 1;
    color: rgb(37 99 235 / var(--tw-text-opacity))
}
        
        .tab-content {
    display: none
}
        
        .tab-content.active {
    display: block
}
        
        .modal {
    position: fixed;
    inset: 0px;
    z-index: 50;
    display: flex;
    display: none;
    align-items: center;
    justify-content: center;
    background-color: rgb(0 0 0 / var(--tw-bg-opacity));
    --tw-bg-opacity: 0.5
}
        
        .modal.active {
    display: flex
}
        
        .modal-content {
    margin-left: 1rem;
    margin-right: 1rem;
    width: 100%;
    max-width: 28rem;
    border-radius: 0.5rem;
    --tw-bg-opacity: 1;
    background-color: rgb(255 255 255 / var(--tw-bg-opacity));
    --tw-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    --tw-shadow-colored: 0 20px 25px -5px var(--tw-shadow-color), 0 8px 10px -6px var(--tw-shadow-color);
    box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow)
}
        
        .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom-width: 1px;
    --tw-border-opacity: 1;
    border-color: rgb(229 231 235 / var(--tw-border-opacity));
    padding: 1.5rem
}
        
        .modal-body {
    padding: 1.5rem
}
        
        .modal-close {
    font-size: 1.5rem;
    line-height: 2rem;
    line-height: 1;
    --tw-text-opacity: 1;
    color: rgb(107 114 128 / var(--tw-text-opacity))
}
        
        .modal-close:hover {
    --tw-text-opacity: 1;
    color: rgb(55 65 81 / var(--tw-text-opacity))
}
        
        .form-group {
    margin-bottom: 1rem
}
        
        .form-group label {
    margin-bottom: 0.25rem;
    display: block;
    font-size: 0.875rem;
    line-height: 1.25rem;
    font-weight: 500;
    --tw-text-opacity: 1;
    color: rgb(55 65 81 / var(--tw-text-opacity))
}
        
        .form-group input, .form-group select {
    width: 100%;
    border-radius: 0.375rem;
    border-width: 1px;
    --tw-border-opacity: 1;
    border-color: rgb(209 213 219 / var(--tw-border-opacity));
    padding-left: 0.75rem;
    padding-right: 0.75rem;
    padding-top: 0.5rem;
    padding-bottom: 0.5rem
}
        
        .form-group input:focus, .form-group select:focus {
    outline: 2px solid transparent;
    outline-offset: 2px;
    --tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color);
    --tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(2px + var(--tw-ring-offset-width)) var(--tw-ring-color);
    box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow, 0 0 #0000);
    --tw-ring-opacity: 1;
    --tw-ring-color: rgb(59 130 246 / var(--tw-ring-opacity))
}
        
        .form-actions {
    margin-top: 1.5rem;
    display: flex;
    justify-content: flex-end;
    gap: 0.5rem
}
        
        .tab-header {
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between
}
        
        .tab-actions {
    display: flex;
    gap: 0.5rem
}
        
        .table {
    width: 100%;
    border-collapse: collapse;
    border-width: 1px;
    --tw-border-opacity: 1;
    border-color: rgb(229 231 235 / var(--tw-border-opacity))
}
        
        .table th, .table td {
    border-width: 1px;
    --tw-border-opacity: 1;
    border-color: rgb(229 231 235 / var(--tw-border-opacity));
    padding-left: 1rem;
    padding-right: 1rem;
    padding-top: 0.5rem;
    padding-bottom: 0.5rem;
    text-align: left
}
        
        .table th {
    --tw-bg-opacity: 1;
    background-color: rgb(249 250 251 / var(--tw-bg-opacity));
    font-weight: 500;
    --tw-text-opacity: 1;
    color: rgb(55 65 81 / var(--tw-text-opacity))
}
        
        .loading {
    padding-top: 2rem;
    padding-bottom: 2rem;
    text-align: center;
    --tw-text-opacity: 1;
    color: rgb(107 114 128 / var(--tw-text-opacity))
}
        
        .empty-state {
    padding-top: 2rem;
    padding-bottom: 2rem;
    text-align: center;
    --tw-text-opacity: 1;
    color: rgb(107 114 128 / var(--tw-text-opacity))
}
        
        .alert {
    margin-bottom: 1rem;
    border-radius: 0.375rem;
    padding: 0.75rem
}
        
        .alert.success {
    border-width: 1px;
    --tw-border-opacity: 1;
    border-color: rgb(187 247 208 / var(--tw-border-opacity));
    --tw-bg-opacity: 1;
    background-color: rgb(220 252 231 / var(--tw-bg-opacity));
    --tw-text-opacity: 1;
    color: rgb(21 128 61 / var(--tw-text-opacity))
}
        
        .alert.error {
    border-width: 1px;
    --tw-border-opacity: 1;
    border-color: rgb(254 202 202 / var(--tw-border-opacity));
    --tw-bg-opacity: 1;
    background-color: rgb(254 226 226 / var(--tw-bg-opacity));
    --tw-text-opacity: 1;
    color: rgb(185 28 28 / var(--tw-text-opacity))
}
        
        .spinner {
    display: inline-block;
    height: 1rem;
    width: 1rem
}
        
        @keyframes spin {
    to {
        transform: rotate(360deg)
    }
}
        
        .spinner {
    animation: spin 1s linear infinite;
    border-radius: 9999px;
    border-width: 2px;
    --tw-border-opacity: 1;
    border-color: rgb(255 255 255 / var(--tw-border-opacity));
    border-top-color: transparent
}
        
        .status-badge {
    border-radius: 9999px;
    padding-left: 0.5rem;
    padding-right: 0.5rem;
    padding-top: 0.25rem;
    padding-bottom: 0.25rem;
    font-size: 0.75rem;
    line-height: 1rem
}
        
        .status-badge.success {
    --tw-bg-opacity: 1;
    background-color: rgb(220 252 231 / var(--tw-bg-opacity));
    --tw-text-opacity: 1;
    color: rgb(22 101 52 / var(--tw-text-opacity))
}
        
        .status-badge.error {
    --tw-bg-opacity: 1;
    background-color: rgb(254 226 226 / var(--tw-bg-opacity));
    --tw-text-opacity: 1;
    color: rgb(153 27 27 / var(--tw-text-opacity))
}
    </style>
  <script type="module" crossorigin src="/assets/index.js"></script>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 max-w-7xl">
        <header class="py-6">
            <div class="flex items-center justify-between">
                <h1 class="text-3xl font-bold text-gray-900">LLM Manager</h1>
                <div class="header-actions">
                </div>
            </div>
        </header>

        <nav class="nav-tabs">
            <div class="nav-item active" onclick="switchTab(event, 'channels')">
                <span class="nav-icon">📡</span>
                <span class="nav-label">渠道管理</span>
            </div>
            <div class="nav-item" onclick="switchTab(event, 'logs')">
                <span class="nav-icon">📝</span>
                <span class="nav-label">API日志</span>
            </div>
            <div class="nav-item" onclick="switchTab(event, 'stats')">
                <span class="nav-icon">📊</span>
                <span class="nav-label">统计信息</span>
            </div>
            <div class="nav-item" onclick="switchTab(event, 'settings')">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">系统设置</span>
            </div>
        </nav>

        <main class="content">
            <!-- 渠道管理标签页 -->
            <section id="channels-tab" class="tab-content active">
                <div class="tab-header">
                    <h2 class="text-xl font-semibold text-gray-900">API渠道管理</h2>
                    <div class="tab-actions">
                        <button class="btn btn-success" onclick="refreshChannels()">刷新</button>
                        <button class="btn btn-primary" onclick="openCreateChannelModal()">新建配置</button>
                    </div>
                </div>
                <div id="channels-list" class="list-container">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <!-- API日志标签页 -->
            <section id="logs-tab" class="tab-content">
                <div class="tab-header">
                    <h2 class="text-xl font-semibold text-gray-900">API调用日志</h2>
                    <div class="tab-actions">
                        <button class="btn btn-success" onclick="refreshLogs()">刷新</button>
                    </div>
                </div>
                <div id="logs-list" class="list-container">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <!-- 统计信息标签页 -->
            <section id="stats-tab" class="tab-content">
                <div class="tab-header">
                    <h2 class="text-xl font-semibold text-gray-900">系统统计</h2>
                    <div class="tab-actions">
                        <button class="btn btn-success" onclick="refreshStats()">刷新</button>
                    </div>
                </div>
                <div id="stats-content" class="stats-container">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <!-- 系统设置标签页 -->
            <section id="settings-tab" class="tab-content">
                <div class="tab-header">
                    <h2 class="text-xl font-semibold text-gray-900">系统信息</h2>
                    <div class="tab-actions">
                        <button class="btn btn-success" onclick="refreshSystemInfo()">刷新</button>
                    </div>
                </div>
                <div id="system-info" class="info-container">
                    <div class="loading">加载中...</div>
                </div>
            </section>
        </main>

        <!-- 创建渠道模态框 -->
        <div id="create-channel-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>新建渠道</h3>
                    <button class="modal-close" onclick="closeCreateChannelModal()">×</button>
                </div>
                <div class="modal-body">
                    <div id="modal-alert"></div>
                    <form id="channel-form" onsubmit="submitChannelForm(event)">
                        <div class="form-group">
                            <label for="name">渠道名称</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="type">渠道类型</label>
                            <select id="type" name="type" required>
                                <option value="">请选择类型</option>
                                <option value="openai">OpenAI</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="claude">Claude</option>
                                <option value="qwen">通义千问</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="models">支持模型</label>
                            <input type="text" id="models" name="models" required placeholder="如: gpt-3.5-turbo,gpt-4">
                        </div>
                        <div class="form-group">
                            <label for="base_url">API Url</label>
                            <input type="url" id="base_url" name="base_url" required placeholder="https://api.openai.com/v1">
                        </div>
                        <div class="form-group">
                            <label for="api_key">API密钥</label>
                            <input type="password" id="api_key" name="api_key" required>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="closeCreateChannelModal()">取消</button>
                            <button type="submit" class="btn btn-primary">
                                创建渠道 <span id="submit-spinner"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- 编辑渠道模态框 -->
        <div id="edit-channel-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>编辑渠道</h3>
                    <button class="modal-close" onclick="closeEditChannelModal()">×</button>
                </div>
                <div class="modal-body">
                    <div id="edit-modal-alert"></div>
                    <form id="edit-channel-form" onsubmit="submitEditChannelForm(event)">
                        <div class="form-group">
                            <label for="edit-name">渠道名称</label>
                            <input type="text" id="edit-name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="edit-type">渠道类型</label>
                            <select id="edit-type" name="type" required>
                                <option value="">请选择类型</option>
                                <option value="openai">OpenAI</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="claude">Claude</option>
                                <option value="qwen">通义千问</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-models">支持模型</label>
                            <input type="text" id="edit-models" name="models" required placeholder="如: gpt-3.5-turbo,gpt-4">
                        </div>
                        <div class="form-group">
                            <label for="edit-base_url">API Url</label>
                            <input type="url" id="edit-base_url" name="base_url" required placeholder="https://api.openai.com/v1">
                        </div>
                        <div class="form-group">
                            <label for="edit-api_key">API密钥</label>
                            <input type="password" id="edit-api_key" name="api_key" placeholder="留空保持不变">
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="closeEditChannelModal()">取消</button>
                            <button type="submit" class="btn btn-primary">
                                更新渠道 <span id="edit-submit-spinner"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    
</body>
</html>
